name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./...

  cross:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, darwin]
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: go build -trimpath -ldflags '-s -w' -o tensorwatch-${{ matrix.os }}-${{ matrix.arch }} ./cmd/tensorwatch
      - uses: actions/upload-artifact@v4
        with:
          name: tensorwatch-${{ matrix.os }}-${{ matrix.arch }}
          path: tensorwatch-${{ matrix.os }}-${{ matrix.arch }}
