name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build cross-platform binaries
        run: |
          set -eux
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME#v}"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          for combo in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            GOOS="${combo%/*}"; GOARCH="${combo#*/}"
            for tool in tensorwatch twload; do
              out="dist/${tool}-${VERSION}-${GOOS}-${GOARCH}"
              CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
                go build -trimpath -ldflags "$LDFLAGS" -o "$out" "./cmd/${tool}"
            done
          done
          ( cd dist && for f in *; do sha256sum "$f" >> SHA256SUMS; done )

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          draft: false
          generate_release_notes: true
